{% extends "base.html" %}
{% block title %}✏️ Editar gasto — MisGastos{% endblock %}
{% block content %}
<div class="mb-4">
    <a href="/expense/{{ txn.id }}" class="text-blue-600 hover:underline">← Volver al detalle</a>
</div>

<h1 class="text-2xl mb-6">✏️ Editar gasto</h1>

<form method="POST" class="bg-white rounded-lg shadow p-6 max-w-lg space-y-4">
    <!-- Fecha -->
    <div>
        <label class="block text-sm font-semibold mb-1">Fecha</label>
        <input type="date" name="date" value="{{ txn.date }}"
               class="w-full border rounded p-2">
    </div>

    <!-- Comercio -->
    <div>
        <label class="block text-sm font-semibold mb-1">Comercio</label>
        <input type="text" name="merchant" value="{{ txn.merchant_name or '' }}"
               class="w-full border rounded p-2">
    </div>

    <!-- NIF -->
    <div>
        <label class="block text-sm font-semibold mb-1">NIF</label>
        <input type="text" name="nif" value="{{ txn.merchant_nif or '' }}"
               class="w-full border rounded p-2">
    </div>

    <!-- Total -->
    <div>
        <label class="block text-sm font-semibold mb-1">Total (€)</label>
        <input type="number" step="0.01" name="total" value="{{ txn.total }}"
               class="w-full border rounded p-2 text-xl font-bold">
    </div>

    <!-- Categoría -->
    <div>
        <label class="block text-sm font-semibold mb-1">Categoría</label>
        <select name="category" class="w-full border rounded p-2">
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if txn.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Método de pago -->
    <div>
        <label class="block text-sm font-semibold mb-1">Método de pago</label>
        <select name="payment_method" class="w-full border rounded p-2">
            <option value="">Desconocido</option>
            <option value="Efectivo" {% if txn.payment_method == 'Efectivo' %}selected{% endif %}>Efectivo</option>
            <option value="Tarjeta" {% if txn.payment_method == 'Tarjeta' %}selected{% endif %}>Tarjeta</option>
            <option value="Bizum" {% if txn.payment_method == 'Bizum' %}selected{% endif %}>Bizum</option>
            <option value="Transferencia" {% if txn.payment_method == 'Transferencia' %}selected{% endif %}>Transferencia</option>
        </select>
    </div>

    <div class="flex gap-3 pt-3">
        <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded font-bold">
            ✅ Guardar cambios
        </button>
        <a href="/expense/{{ txn.id }}"
           class="flex-1 text-center text-gray-600 py-2 border rounded hover:bg-gray-50 font-bold">
            Cancelar
        </a>
    </div>
</form>
{% endblock %}
