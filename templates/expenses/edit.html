{% extends "base.html" %}
{% block title %}Editar — MisGastos{% endblock %}
{% block content %}

<div class="mb-4">
 <a href="/expense/{{ txn.id }}" class="text-accent hover:underline text-sm">← Volver al detalle</a>
</div>

<h1 class="text-xl font-semibold mb-6">Editar gasto</h1>

<form method="POST" class="border border-gray-200 dark:border-gray-700 rounded p-6 bg-white dark:bg-darkcanvas-subtle max-w-2xl space-y-4">
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">Fecha</label>
 <input type="date" name="date" value="{{ txn.date }}" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5">
 </div>
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">Comercio</label>
 <input type="text" name="merchant" value="{{ txn.merchant_name or '' }}" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5">
 </div>
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">NIF</label>
 <input type="text" name="nif" value="{{ txn.merchant_nif or '' }}" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5">
 </div>
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">Total (€)</label>
 <input type="number" step="0.01" name="total" value="{{ txn.total }}" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5 text-lg font-bold">
 </div>
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">Categoría</label>
 <select name="category" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5">
 {% for cat in categories %}
 <option value="{{ cat.id }}" {% if txn.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
 {% endfor %}
 </select>
 </div>
 <div>
 <label class="block text-xs font-medium text-fg-muted mb-1">Método de pago</label>
 <select name="payment_method" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-darkcanvas dark:text-darkfg rounded px-3 py-1.5">
 <option value="">—</option>
 <option value="Efectivo" {% if txn.payment_method == 'Efectivo' %}selected{% endif %}>Efectivo</option>
 <option value="Tarjeta" {% if txn.payment_method == 'Tarjeta' %}selected{% endif %}>Tarjeta</option>
 <option value="Bizum" {% if txn.payment_method == 'Bizum' %}selected{% endif %}>Bizum</option>
 <option value="Transferencia" {% if txn.payment_method == 'Transferencia' %}selected{% endif %}>Transferencia</option>
 </select>
 </div>
 <div class="flex gap-3 pt-2">
 <button type="submit" class="flex-1 bg-success text-white py-2 rounded font-medium hover:opacity-90">Guardar cambios</button>
 <a href="/expense/{{ txn.id }}" class="flex-1 text-center text-fg-muted py-2 border border-gray-300 dark:border-gray-600 rounded hover:bg-canvas-subtle dark:hover:bg-darkcanvas font-medium">Cancelar</a>
 </div>
</form>
{% endblock %}
