{% extends "base.html" %}
{% block content %}
<div class="text-center">
    <h1 class="text-3xl mb-6">📷 Nuevo ticket</h1>

    <form hx-post="/scan/upload"
          hx-encoding="multipart/form-data"
          hx-target="#result"
          hx-swap="innerHTML"
          class="border-2 border-dashed border-gray-300 rounded-lg p-12 bg-white">

        <input type="file" name="image" accept="image/*" capture="environment"
               class="hidden" id="file-input">

        <button type="button"
                onclick="document.getElementById('file-input').click()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-6 rounded-lg text-xl font-bold">
            📷 Hacer foto al ticket
        </button>

        <p class="mt-4 text-gray-500">o arrastra una imagen aquí</p>
        <p class="mt-2 text-sm text-amber-600">
            ℹ️ Asegúrate de que la foto sea clara y el ticket esté lo más liso posible
        </p>
    </form>

    <div id="result" class="mt-8"></div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const form = fileInput.closest('form');

    fileInput.addEventListener('change', function() {
        form.requestSubmit();
    });

    // Drag & drop
    form.addEventListener('dragover', e => {
        e.preventDefault();
        form.classList.add('border-blue-500', 'bg-blue-50');
    });
    form.addEventListener('dragleave', e => {
        e.preventDefault();
        form.classList.remove('border-blue-500', 'bg-blue-50');
    });
    form.addEventListener('drop', e => {
        e.preventDefault();
        form.classList.remove('border-blue-500', 'bg-blue-50');
        const files = e.dataTransfer.files;
        if (files.length > 0 && files[0].type.startsWith('image/')) {
            const dt = new DataTransfer();
            dt.items.add(files[0]);
            fileInput.files = dt.files;
            form.requestSubmit();
        }
    });
</script>
{% endblock %}
