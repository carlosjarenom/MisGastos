<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MisGastos{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 14px; }
        input, select, button { font-size: 14px; }
        .sidebar { width: 240px; min-height: calc(100vh - 4rem); }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Top bar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 mb-0 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-800">💸 MisGastos</a>
            <div class="flex items-center gap-4">
                {% if review_queue_count > 0 %}
                <a href="/scan/review-queue" class="px-3 py-1.5 text-sm font-medium text-red-700 bg-red-50 rounded-lg hover:bg-red-100">
                    ⚠️ Revisar ({{ review_queue_count }})
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto flex">
        <!-- Sidebar navigation (desktop) -->
        <aside class="sidebar bg-white border-r border-gray-200 py-4 px-3">
            <nav class="space-y-1">
                <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 font-medium">
                    📊 Dashboard
                </a>
                <a href="/scan" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 font-medium">
                    📷 Nuevo ticket
                </a>
                <a href="/expenses" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 font-medium">
                    📋 Historial
                </a>
                <a href="/import-excel" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 font-medium">
                    📥 Importar Excel
                </a>
                <a href="/export-excel" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 font-medium">
                    📤 Exportar Excel
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 px-6 py-6 pb-12 min-w-0">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
