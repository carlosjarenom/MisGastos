<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{% block title %}MisGastos{% endblock %}</title>
 <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
 <script src="https://unpkg.com/htmx.org@1.9.12"></script>
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
 // Tailwind config con modo oscuro
 tailwind.config = {
 darkMode: 'class',
 theme: {
 extend: {
 colors: {
 // Colores estilo GitHub
 canvas: {
 DEFAULT: '#ffffff',
 subtle: '#f6f8fa',
 inset: '#eaeef2',
 },
 fg: {
 DEFAULT: '#1f2328',
 muted: '#59636e',
 subtle: '#6e7781',
 },
 accent: {
 DEFAULT: '#0969da',
 emphasis: '#0550ae',
 subtle: '#ddf4ff',
 },
 success: '#1a7f37',
 danger: '#d1242f',
 warning: '#9a6700',
 // Dark mode
 darkcanvas: {
 DEFAULT: '#0d1117',
 subtle: '#161b22',
 inset: '#010409',
 },
 darkfg: {
 DEFAULT: '#e6edf3',
 muted: '#8d96a0',
 subtle: '#6e7681',
 },
 },
 }
 }
 }
 </script>
 <style>
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
 font-size: 14px;
 line-height: 1.5;
 }
 /* Mejor scrollbars en dark mode */
 ::-webkit-scrollbar { width: 10px; height: 10px; }
 ::-webkit-scrollbar-track { background: transparent; }
 ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 5px; }
 .dark ::-webkit-scrollbar-thumb { background: #30363d; }

 /* Transición suave al cambiar tema */
 * { transition: background-color 0.15s, border-color 0.15s; }
 </style>
 <script>
 // Aplicar tema guardado ANTES de renderizar (evita flash)
 (function() {
 const theme = localStorage.getItem('theme') || 'light';
 if (theme === 'dark') {
 document.documentElement.classList.add('dark');
 }
 })();
 </script>
</head>
<body class="bg-white dark:bg-darkcanvas text-fg dark:text-darkfg min-h-screen">

 <!-- Header estilo GitHub -->
 <header class="bg-canvas-subtle dark:bg-darkcanvas-subtle border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20">
 <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
 <div class="flex items-center gap-3">
 <a href="/" class="text-lg font-semibold flex items-center gap-2">
 <span class="text-2xl">💸</span>
 <span>MisGastos</span>
 </a>
 </div>

 <div class="flex items-center gap-2">
 {% if review_queue_count > 0 %}
 <a href="/scan/review-queue" class="px-3 py-1 text-sm font-medium text-danger border border-danger rounded hover:bg-red-50 dark:hover:bg-red-900/20">
 ⚠️ Revisar ({{ review_queue_count }})
 </a>
 {% endif %}

 <!-- Toggle tema -->
 <button onclick="toggleTheme()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700" title="Cambiar tema">
 <svg class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 16 16"><path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8zM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13zm8-5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8zM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8zm10.34-5.34a.75.75 0 0 1 0 1.06l-1.06 1.06a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zM5.46 10.54a.75.75 0 0 1 0 1.06L4.4 12.66a.75.75 0 1 1-1.06-1.06l1.06-1.06a.75.75 0 0 1 1.06 0zm7.88 7.88a.75.75 0 0 1-1.06 0l-1.06-1.06a.75.75 0 1 1 1.06-1.06l1.06 1.06a.75.75 0 0 1 0 1.06zM5.46 5.46a.75.75 0 0 1-1.06 0L3.34 4.4a.75.75 0 1 1 1.06-1.06l1.06 1.06a.75.75 0 0 1 0 1.06z"/></svg>
 <svg class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 16 16"><path d="M9.598 1.591a.75.75 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.5 5.5 0 1 0 7.678-7.678z"/></svg>
 </button>
 </div>
 </div>
 </header>

 <!-- Layout: sidebar + main -->
 <div class="max-w-6xl mx-auto px-4 flex gap-6 pt-6">
 <!-- Sidebar -->
 <aside class="w-48 flex-shrink-0 hidden md:block">
 <nav class="space-y-1 sticky top-20">
 <a href="/" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle {% if request.path == '/' %}bg-accent-subtle dark:bg-darkcanvas-subtle text-accent{% endif %}">
 📊 Dashboard
 </a>
 <a href="/scan" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle {% if request.path == '/scan' %}bg-accent-subtle dark:bg-darkcanvas-subtle text-accent{% endif %}">
 📷 Subir ticket
 </a>
 <a href="/expense/new" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle {% if request.path == '/expense/new' %}bg-accent-subtle dark:bg-darkcanvas-subtle text-accent{% endif %}">
 ➕ Nuevo gasto
 </a>
 <a href="/expenses" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle {% if request.path == '/expenses' %}bg-accent-subtle dark:bg-darkcanvas-subtle text-accent{% endif %}">
 📋 Historial
 </a>
 <div class="border-t border-gray-200 dark:border-gray-700 my-3"></div>
 <a href="/import-excel" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-fg-muted hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle">
 📥 Importar
 </a>
 <a href="/export-excel" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-fg-muted hover:bg-canvas-subtle dark:hover:bg-darkcanvas-subtle">
 📤 Exportar
 </a>
 </nav>
 </aside>

 <!-- Main content -->
 <main class="flex-1 min-w-0 pb-12">
 {% block content %}{% endblock %}
 </main>
 </div>

 <script>
 function toggleTheme() {
 const isDark = document.documentElement.classList.toggle('dark');
 localStorage.setItem('theme', isDark ? 'dark' : 'light');
 }
 </script>
</body>
</html>
